name: CI

on:
  push:
  pull_request:

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Verify backend app import
        run: node -e "process.env.DB_HOST='localhost';process.env.DB_PORT='3306';process.env.DB_USER='root';process.env.DB_PASSWORD='root';process.env.DB_NAME='bharat_finvest_ops';require('./backend/src/app');console.log('Backend app import successful');"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

